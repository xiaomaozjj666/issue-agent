<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235da9ff'/%3E%3Cpath d='M9 9h14v3H9zm0 6h14v3H9zm0 6h9v3H9z' fill='white'/%3E%3C/svg%3E">
<title>GitHub Issue Agent</title>
<style>
:root{--bg:#0b0f14;--fg:#d6dde5;--muted:#8793a1;--border:#26303b;--accent:#5da9ff;--accent-soft:#13263a;--card:#121820;--panel:#0f151c;--green:#46c26f;--yellow:#e3ad3e;--red:#ff635d;--radius:10px}
[data-theme="light"]{--bg:#f6f4ef;--fg:#202830;--muted:#66717c;--border:#cdd2d5;--card:#fff;--panel:#f0eee8;--accent-soft:#e5f1ff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI Variable","Aptos",sans-serif;background:var(--bg);color:var(--fg);height:100vh;height:100dvh;display:flex;overflow:hidden}
button,input{font:inherit}
#sidebar{width:280px;flex:0 0 280px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--panel)}
.brand-bar{height:52px;flex:0 0 52px;padding:0 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#sidebar h2{font-family:"Bahnschrift","Arial Narrow",sans-serif;font-size:17px;letter-spacing:.04em;color:var(--accent)}
.brand-actions{display:flex;align-items:center;gap:8px}
.theme-toggle,.mobile-history-toggle{cursor:pointer;color:var(--muted);background:transparent;border:0;font-size:17px}
.mobile-history-toggle{display:none}
.issue-compose{padding:14px;border-bottom:1px solid var(--border);display:grid;gap:8px}
#sidebar input{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--fg);font-size:12px;outline:none}
#sidebar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 14%,transparent)}
.primary-action{width:100%;padding:9px 12px;border:0;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:12px;font-weight:700}
.primary-action:hover{filter:brightness(1.08)}
.history-panel{flex:1;min-height:0;display:flex;flex-direction:column}
.history-toolbar{padding:12px 14px 8px;display:grid;gap:9px}
.history-heading{display:flex;align-items:center;justify-content:space-between}
.history-heading span{font:10px "Cascadia Code",Consolas,monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.archive-toggle{border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:11px;padding:3px}
.archive-toggle:hover,.archive-toggle.active{color:var(--accent)}
#history-list{flex:1;min-height:0;overflow-y:auto;padding:0 8px 14px;scrollbar-gutter:stable}
.session-group{margin-top:12px}
.session-group-title{padding:0 8px 6px;font:9px "Cascadia Code",Consolas,monospace;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.session-row{position:relative;border-radius:9px;margin-bottom:3px;border:1px solid transparent}
.session-row:hover{background:var(--card);border-color:var(--border)}
.session-row.active{background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 30%,var(--border));box-shadow:inset 2px 0 var(--accent)}
.session-card{width:100%;display:block;text-align:left;padding:9px 54px 9px 10px;border:0;background:transparent;color:var(--fg);cursor:pointer;min-height:62px}
.session-repo{display:flex;align-items:center;gap:6px;color:var(--muted);font:10px "Cascadia Code",Consolas,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-dot{width:7px;height:7px;flex:0 0 7px;border-radius:50%;background:var(--muted)}
.status-dot.running{background:var(--yellow);box-shadow:0 0 0 3px color-mix(in srgb,var(--yellow) 16%,transparent);animation:pulse 1.4s ease-in-out infinite}
.status-dot.completed{background:var(--green)}
.status-dot.failed{background:var(--red)}
.session-title{font-size:12px;font-weight:650;line-height:1.35;margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.session-time{font-size:9px;color:var(--muted);margin-top:4px}
.session-actions{position:absolute;right:7px;top:8px;display:flex;gap:2px;opacity:0;transition:opacity .15s}
.session-row:hover .session-actions,.session-row.active .session-actions,.session-actions:focus-within{opacity:1}
.session-action{width:22px;height:22px;border:0;border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:12px}
.session-action:hover{background:var(--bg);color:var(--accent)}
.history-empty{padding:34px 18px;text-align:center;color:var(--muted);font-size:11px;line-height:1.6}
.history-error{color:var(--red)}
dialog{width:min(420px,calc(100vw - 32px));border:1px solid var(--border);border-radius:14px;background:var(--panel);color:var(--fg);padding:0;box-shadow:0 28px 90px rgba(0,0,0,.48)}
dialog::backdrop{background:rgba(4,8,12,.72);backdrop-filter:blur(4px)}
.dialog-body{padding:20px;display:grid;gap:14px}
.dialog-body h3{font-family:"Bahnschrift","Arial Narrow",sans-serif;font-size:17px}
.dialog-body p{color:var(--muted);font-size:12px;line-height:1.55}
.dialog-body input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--fg);outline:none}
.dialog-body input:focus{border-color:var(--accent)}
.dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}
.dialog-actions button{border:1px solid var(--border);border-radius:8px;padding:8px 13px;background:var(--card);color:var(--fg);cursor:pointer;font-size:12px;font-weight:650}
.dialog-actions .danger{border-color:color-mix(in srgb,var(--red) 55%,var(--border));background:var(--red);color:#fff}
.dialog-actions .confirm{background:var(--accent);border-color:var(--accent);color:#fff}
@keyframes pulse{50%{opacity:.45}}
#main{flex:1;min-width:0;min-height:0;display:flex;position:relative;overflow:hidden}
#conversation{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column}
#conversation-header{height:52px;flex:0 0 52px;padding:0 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:color-mix(in srgb,var(--bg) 88%,transparent)}
.conversation-label{font-family:"Cascadia Code",Consolas,monospace;color:var(--muted);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
#report-toggle,.report-close{border:1px solid var(--border);background:var(--card);color:var(--fg);border-radius:999px;padding:7px 12px;cursor:pointer;font-size:12px;font-weight:650}
#report-toggle{display:none;color:var(--accent);border-color:color-mix(in srgb,var(--accent) 45%,var(--border))}
#report-toggle:hover,.report-close:hover{background:var(--accent-soft)}
#messages{flex:1;min-height:0;overflow-y:auto;padding:20px clamp(16px,4vw,48px);display:flex;flex-direction:column;gap:12px;scrollbar-gutter:stable}
.msg{padding:12px 16px;border-radius:var(--radius);max-width:85%}
.msg.system{align-self:center;background:var(--card);border:1px solid var(--border);max-width:95%;font-size:13px}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff}
.msg.assistant{align-self:flex-start;background:var(--card);border:1px solid var(--border)}
.msg.tool{align-self:flex-start;background:var(--card);border:1px solid var(--yellow);font-family:monospace;font-size:12px;cursor:pointer}
.msg.tool .preview{max-height:60px;overflow:hidden}
.msg.tool .full{display:none;margin-top:8px;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.msg.tool.expanded .full{display:block}
.msg.tool.expanded .preview{display:none}
.msg.error{align-self:center;background:var(--red);color:#fff}
#report-panel{display:none;width:min(460px,42vw);flex:0 0 min(460px,42vw);min-width:340px;border-left:1px solid var(--border);background:var(--panel);min-height:0;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,.18)}
#main.report-open #report-panel{display:flex}
.report-header{height:52px;flex:0 0 52px;padding:0 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.report-header h2{font-family:"Bahnschrift","Arial Narrow",sans-serif;font-size:15px;letter-spacing:.05em}
#report{padding:20px;overflow-y:auto;min-height:0;line-height:1.55}
#report h3{font-size:18px;line-height:1.35;color:var(--accent);margin-bottom:12px}
#report h4{font-family:"Bahnschrift","Arial Narrow",sans-serif;font-size:12px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin:22px 0 8px}
#report p,#report li{font-size:13px}
#report ul{padding-left:18px;display:grid;gap:6px}
#report pre{background:var(--bg);border:1px solid var(--border);padding:12px;border-radius:var(--radius);overflow:auto;font:12px/1.55 "Cascadia Code",Consolas,monospace;max-height:52vh}
.report-meta{display:flex;align-items:center;gap:8px;margin-bottom:18px;color:var(--muted);font-size:12px}
.report-section{border-top:1px solid var(--border);padding-top:14px;margin-top:14px}
.report-section h4{margin-top:0}
.evidence-list{display:grid;gap:8px}
.evidence-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.evidence-path{font:11px "Cascadia Code",Consolas,monospace;color:var(--accent);overflow-wrap:anywhere;margin-bottom:5px}
#report details{margin-top:14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card)}
#report summary{padding:11px 12px;cursor:pointer;font-size:12px;font-weight:700;color:var(--accent)}
#report details pre{margin:0 10px 10px}
.badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge.high{background:var(--green);color:#07130b}
.badge.medium{background:var(--yellow);color:#000}
.badge.low{background:var(--red);color:#fff}
#input-bar{display:flex;flex:0 0 auto;padding:12px 20px;border-top:1px solid var(--border);gap:8px;background:var(--panel)}
#input-bar input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--fg);font-size:14px}
#input-bar button{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-weight:600}
#progress{padding:6px 20px;font-size:12px;color:var(--yellow);min-height:28px;flex:0 0 28px;background:var(--panel)}
@media(max-width:900px){
  #sidebar{width:220px;flex-basis:220px}
  #report-panel{position:absolute;z-index:10;inset:0 0 0 auto;width:min(520px,100%);min-width:0;box-shadow:-24px 0 80px rgba(0,0,0,.45)}
}
@media(max-width:640px){
  body{display:block}
  #sidebar{width:100%;height:112px;border-right:0;border-bottom:1px solid var(--border);overflow:hidden}
  .brand-bar{height:44px;flex-basis:44px}
  .issue-compose{padding:8px 10px;grid-template-columns:1fr auto;border-bottom:0}
  .primary-action{width:auto}
  .history-panel{display:none}
  .mobile-history-toggle{display:inline-block}
  #sidebar.mobile-history-open{position:fixed;inset:0;height:100dvh;z-index:30;border:0}
  #sidebar.mobile-history-open .issue-compose{display:none}
  #sidebar.mobile-history-open .history-panel{display:flex}
  #main{height:calc(100dvh - 112px)}
  #messages{padding:14px}
  .msg{max-width:94%}
}
</style>
</head>
<body>
<div id="sidebar">
  <div class="brand-bar">
    <h2>Issue Agent</h2>
    <div class="brand-actions">
      <button class="mobile-history-toggle" type="button" onclick="toggleMobileHistory()" title="Session history" aria-label="Session history" aria-expanded="false">☷</button>
      <button class="theme-toggle" type="button" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">&#9788;</button>
    </div>
  </div>
  <div class="issue-compose">
    <input id="issueUrl" placeholder="Paste a GitHub Issue URL" value="">
    <button class="primary-action" type="button" onclick="analyze()">New analysis</button>
  </div>
  <div class="history-panel">
    <div class="history-toolbar">
      <div class="history-heading">
        <span id="history-title">Sessions</span>
        <button id="archive-toggle" class="archive-toggle" type="button" onclick="toggleArchiveView()">Archived</button>
      </div>
      <input id="history-search" type="search" maxlength="160" placeholder="Search issues and repositories" oninput="scheduleHistorySearch()">
    </div>
    <div id="history-list" aria-live="polite"></div>
  </div>
</div>
<div id="main">
  <div id="conversation">
    <div id="conversation-header">
      <span class="conversation-label">Investigation thread</span>
      <button id="report-toggle" type="button" onclick="toggleReport(true)" aria-controls="report-panel" aria-expanded="false">View report</button>
    </div>
    <div id="messages"></div>
    <div id="progress"></div>
    <div id="input-bar" style="display:none">
      <input id="chatInput" placeholder="Ask follow-up questions..." onkeydown="if(event.key==='Enter')chat()">
      <button onclick="chat()">Send</button>
    </div>
  </div>
  <aside id="report-panel" aria-label="Analysis report">
    <div class="report-header">
      <h2>Analysis report</h2>
      <button class="report-close" type="button" onclick="toggleReport(false)" aria-label="Close report">Close</button>
    </div>
    <div id="report"></div>
  </aside>
  </div>
<dialog id="session-dialog">
  <form class="dialog-body" onsubmit="submitSessionDialog(event)">
    <h3 id="dialog-title">Rename session</h3>
    <p id="dialog-message"></p>
    <input id="dialog-input" maxlength="160" autocomplete="off">
    <div class="dialog-actions">
      <button type="button" onclick="closeSessionDialog()">Cancel</button>
      <button id="dialog-confirm" class="confirm" type="submit">Save</button>
    </div>
  </form>
</dialog>
<script>
let sessionId = null;
let report = null;
let showArchived = false;
let historySearchTimer = null;
let dialogSession = null;
let dialogMode = null;

function toggleTheme(){const h=document.documentElement;h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';localStorage.setItem('ds-theme',h.dataset.theme)}
(function(){const s=localStorage.getItem('ds-theme');if(s)document.documentElement.dataset.theme=s})()

function toggleMobileHistory(){
  const sidebar=document.getElementById('sidebar');
  const open=sidebar.classList.toggle('mobile-history-open');
  document.querySelector('.mobile-history-toggle').setAttribute('aria-expanded',String(open));
}

function scheduleHistorySearch(){
  clearTimeout(historySearchTimer);
  historySearchTimer=setTimeout(loadSessions,220);
}

function toggleArchiveView(){
  showArchived=!showArchived;
  const button=document.getElementById('archive-toggle');
  button.classList.toggle('active',showArchived);
  button.textContent=showArchived?'Active':'Archived';
  document.getElementById('history-title').textContent=showArchived?'Archive':'Sessions';
  loadSessions();
}

async function apiJson(url,options){
  const response=await fetch(url,options);
  if(!response.ok){
    let detail='Request failed';
    try{detail=(await response.json()).detail||detail}catch(e){}
    throw new Error(detail);
  }
  return response.status===204?null:response.json();
}

async function loadSessions(){
  const list=document.getElementById('history-list');
  const query=document.getElementById('history-search').value.trim();
  try{
    const sessions=await apiJson('/sessions?archived='+showArchived+'&q='+encodeURIComponent(query));
    renderSessions(sessions);
  }catch(error){
    list.innerHTML='<div class="history-empty history-error">'+escapeHtml(error.message)+'</div>';
  }
}

function renderSessions(sessions){
  const list=document.getElementById('history-list');
  list.innerHTML='';
  if(!sessions.length){
    list.innerHTML='<div class="history-empty">'+(showArchived?'No archived sessions.':'No sessions yet.<br>Paste an Issue URL to begin.')+'</div>';
    return;
  }
  const groups=new Map();
  sessions.forEach(function(session){
    const group=session.status==='running'?'Running':historyGroup(session.updated_at);
    if(!groups.has(group))groups.set(group,[]);
    groups.get(group).push(session);
  });
  ['Running','Today','Previous 7 days','Older'].forEach(function(groupName){
    const items=groups.get(groupName);
    if(!items)return;
    const group=document.createElement('section');
    group.className='session-group';
    const heading=document.createElement('div');
    heading.className='session-group-title';
    heading.textContent=groupName;
    group.appendChild(heading);
    items.forEach(function(item){group.appendChild(createSessionRow(item))});
    list.appendChild(group);
  });
}

function createSessionRow(session){
  const row=document.createElement('div');
  row.className='session-row'+(session.session_id===sessionId?' active':'');
  row.dataset.sessionId=session.session_id;

  const card=document.createElement('button');
  card.type='button';
  card.className='session-card';
  card.onclick=function(){restoreSession(session.session_id)};
  const repository=session.owner&&session.repo?session.owner+'/'+session.repo:repositoryFromUrl(session.issue_url);
  const issue=session.issue_number?' #'+session.issue_number:'';
  card.innerHTML='<div class="session-repo"><span class="status-dot '+session.status+'"></span><span>'+escapeHtml(repository+issue)+'</span></div>'+
    '<div class="session-title">'+escapeHtml(session.title)+'</div><div class="session-time">'+escapeHtml(relativeTime(session.updated_at))+'</div>';
  row.appendChild(card);

  const actions=document.createElement('div');
  actions.className='session-actions';
  actions.appendChild(sessionAction('✎','Rename',function(){renameSession(session)}));
  actions.appendChild(sessionAction(showArchived?'↩':'⌁',showArchived?'Restore':'Archive',function(){archiveSession(session,!showArchived)}));
  if(showArchived)actions.appendChild(sessionAction('×','Delete',function(){openDeleteDialog(session)}));
  row.appendChild(actions);
  return row;
}

function sessionAction(symbol,label,handler){
  const button=document.createElement('button');
  button.type='button';
  button.className='session-action';
  button.textContent=symbol;
  button.title=label;
  button.setAttribute('aria-label',label);
  button.onclick=function(event){event.stopPropagation();handler()};
  return button;
}

function historyGroup(value){
  const date=new Date(value);
  const now=new Date();
  if(date.toDateString()===now.toDateString())return'Today';
  return now-date<7*24*60*60*1000?'Previous 7 days':'Older';
}

function relativeTime(value){
  const seconds=Math.max(0,Math.floor((Date.now()-new Date(value).getTime())/1000));
  if(seconds<60)return'just now';
  if(seconds<3600)return Math.floor(seconds/60)+'m ago';
  if(seconds<86400)return Math.floor(seconds/3600)+'h ago';
  if(seconds<604800)return Math.floor(seconds/86400)+'d ago';
  return new Date(value).toLocaleDateString();
}

function repositoryFromUrl(url){
  const match=url.match(/github\.com\/([^/]+)\/([^/]+)/i);
  return match?match[1]+'/'+match[2]:'GitHub Issue';
}

async function restoreSession(id){
  try{
    const session=await apiJson('/session/'+encodeURIComponent(id));
    sessionId=session.session_id;
    report=session.report;
    resetWorkspace(false);
    document.getElementById('issueUrl').value=session.issue_url;
    document.querySelector('.conversation-label').textContent=session.owner&&session.repo?
      session.owner+'/'+session.repo+(session.issue_number?' #'+session.issue_number:''):'Investigation thread';
    session.messages.forEach(function(message){
      if((message.role==='user'||message.role==='assistant')&&message.content)addMsg(message.role,message.content);
    });
    if(report){
      renderReport(report);
      document.getElementById('report-toggle').style.display='inline-flex';
      if(!session.archived)document.getElementById('input-bar').style.display='flex';
      if(!session.messages.length)addMsg('system','Session restored. Continue the conversation or open the report.');
      if(session.archived)addMsg('system','Archived sessions are read-only. Restore this session from the sidebar to continue.');
    }else if(session.status==='failed'){
      addMsg('error',session.error_message||'This investigation failed before producing a report.');
    }else{
      addMsg('system','This investigation has not produced a report yet.');
    }
    document.getElementById('sidebar').classList.remove('mobile-history-open');
    await loadSessions();
  }catch(error){addMsg('error',error.message)}
}

async function renameSession(session){
  dialogSession=session;
  dialogMode='rename';
  document.getElementById('dialog-title').textContent='Rename session';
  document.getElementById('dialog-message').textContent='Choose a concise title that will be easy to find later.';
  const input=document.getElementById('dialog-input');
  input.style.display='block';
  input.value=session.title;
  const confirmButton=document.getElementById('dialog-confirm');
  confirmButton.textContent='Save';
  confirmButton.className='confirm';
  document.getElementById('session-dialog').showModal();
  input.select();
}

function openDeleteDialog(session){
  dialogSession=session;
  dialogMode='delete';
  document.getElementById('dialog-title').textContent='Delete session permanently?';
  document.getElementById('dialog-message').textContent='“'+session.title+'” and its conversation history will be removed. This cannot be undone.';
  document.getElementById('dialog-input').style.display='none';
  const confirmButton=document.getElementById('dialog-confirm');
  confirmButton.textContent='Delete forever';
  confirmButton.className='danger';
  document.getElementById('session-dialog').showModal();
  confirmButton.focus();
}

function closeSessionDialog(){
  document.getElementById('session-dialog').close();
  dialogSession=null;
  dialogMode=null;
}

async function submitSessionDialog(event){
  event.preventDefault();
  if(!dialogSession)return;
  if(dialogMode==='delete'){
    const session=dialogSession;
    closeSessionDialog();
    await deleteSession(session);
    return;
  }
  const title=document.getElementById('dialog-input').value.trim();
  if(!title)return;
  if(title===dialogSession.title){closeSessionDialog();return}
  try{
    await apiJson('/session/'+encodeURIComponent(dialogSession.session_id),{
      method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({display_title:title.trim()})
    });
    closeSessionDialog();
    await loadSessions();
  }catch(error){addMsg('error',error.message)}
}

async function archiveSession(session,archived){
  try{
    await apiJson('/session/'+encodeURIComponent(session.session_id),{
      method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({archived:archived})
    });
    if(archived&&session.session_id===sessionId){sessionId=null;report=null;resetWorkspace(true)}
    if(!archived){
      showArchived=false;
      document.getElementById('archive-toggle').classList.remove('active');
      document.getElementById('archive-toggle').textContent='Archived';
      document.getElementById('history-title').textContent='Sessions';
      if(session.session_id===sessionId){await restoreSession(session.session_id);return}
    }
    await loadSessions();
  }catch(error){addMsg('error',error.message)}
}

async function deleteSession(session){
  try{
    await apiJson('/session/'+encodeURIComponent(session.session_id),{method:'DELETE'});
    if(session.session_id===sessionId){sessionId=null;report=null;resetWorkspace(true)}
    await loadSessions();
  }catch(error){addMsg('error',error.message)}
}

function resetWorkspace(showWelcome){
  document.getElementById('messages').innerHTML='';
  document.getElementById('main').classList.remove('report-open');
  document.getElementById('report-toggle').style.display='none';
  document.getElementById('report').innerHTML='';
  document.getElementById('input-bar').style.display='none';
  document.getElementById('progress').textContent='';
  document.querySelector('.conversation-label').textContent='Investigation thread';
  if(showWelcome)document.getElementById('issueUrl').value='';
  if(showWelcome)addMsg('system','Choose a previous session or start a new Issue analysis.');
}

function addMsg(role,content,cls=''){
  const d=document.getElementById('messages');
  const m=document.createElement('div');
  m.className='msg '+role+' '+cls;
  m.textContent=content;
  d.appendChild(m);
  d.scrollTop=d.scrollHeight;
  return m;
}

function addToolCard(name,args){
  const d=document.getElementById('messages');
  const m=document.createElement('div');
  m.className='msg tool';
  m.innerHTML='<div class="preview"><b>'+name+'</b> '+JSON.stringify(args).substring(0,80)+'...</div><div class="full"></div>';
  m.onclick=function(){this.classList.toggle('expanded')};
  d.appendChild(m);
  d.scrollTop=d.scrollHeight;
  return m;
}

async function analyze(){
  const url=document.getElementById('issueUrl').value.trim();
  if(!url)return;
  sessionId=null;
  report=null;
  resetWorkspace(false);
  document.getElementById('progress').textContent='Fetching issue...';
  addMsg('assistant','Analyzing: '+url);

  try{
    const resp=await fetch('/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({issue_url:url})});
    if(!resp.ok)throw new Error((await resp.json()).detail||'Unable to start analysis');
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buf='';
    let toolCard=null;

    while(true){
      const{value,done}=await reader.read();
      if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6);
        if(data==='[DONE]'){document.getElementById('progress').textContent='Done.';break}
        try{
          const evt=JSON.parse(data);
          switch(evt.type){
            case'session':
              sessionId=evt.data.session_id;
              loadSessions();
              break;
            case'start':
              document.getElementById('progress').textContent='Exploring '+evt.data.file_count+' files...';
              document.querySelector('.conversation-label').textContent=evt.data.title||'Investigation thread';
              break;
            case'tool_call':
              document.getElementById('progress').textContent=evt.data.name+': '+JSON.stringify(evt.data.args).substring(0,60);
              toolCard=addToolCard(evt.data.name,evt.data.args);
              break;
            case'tool_result':
              if(toolCard){toolCard.querySelector('.full').textContent=evt.data.preview||'';toolCard.classList.add('expanded')}
              break;
            case'thinking':
              addMsg('assistant',evt.data.content);
              break;
            case'report':
              report=evt.data;
              renderReport(report);
              document.getElementById('input-bar').style.display='flex';
              document.getElementById('report-toggle').style.display='inline-flex';
              document.getElementById('progress').textContent='';
              addMsg('system','Report ready. Continue the conversation, or open the report when you need it.');
              document.getElementById('chatInput').focus();
              loadSessions();
              break;
            case'error':
              addMsg('error',evt.message||'Error');
              document.getElementById('progress').textContent='';
              loadSessions();
              break;
            case'done':
              loadSessions();
              break;
          }
        }catch(e){}
      }
    }
  }catch(e){
    addMsg('error','Connection error: '+e.message);
    document.getElementById('progress').textContent='';
  }
}

function renderReport(r){
  const d=document.getElementById('report');
  let h='<h3>'+escapeHtml(r.summary)+'</h3>';
  h+='<div class="report-meta"><span>Confidence</span><span class="badge '+r.confidence+'">'+r.confidence+'</span></div>';
  h+='<section class="report-section"><h4>Root cause</h4><p>'+escapeHtml(r.root_cause)+'</p></section>';
  if(r.evidence&&r.evidence.length){
    h+='<section class="report-section"><h4>Code evidence</h4><div class="evidence-list">';
    r.evidence.forEach(function(e){h+='<div class="evidence-item"><div class="evidence-path">'+escapeHtml(e.path)+' · '+escapeHtml(e.lines||'')+'</div><p>'+escapeHtml(e.reason||'')+'</p></div>'});
    h+='</div></section>';
  }
  if(r.proposed_changes&&r.proposed_changes.length){h+='<section class="report-section"><h4>Proposed changes</h4><ul>'+r.proposed_changes.map(function(c){return'<li>'+escapeHtml(c)+'</li>'}).join('')+'</ul></section>'}
  if(r.patch){h+='<details><summary>View generated patch</summary><pre>'+escapeHtml(r.patch)+'</pre></details>'}
  if(r.tests&&r.tests.length){h+='<section class="report-section"><h4>Suggested tests</h4><ul>'+r.tests.map(function(t){return'<li>'+escapeHtml(t)+'</li>'}).join('')+'</ul></section>'}
  if(r.risks&&r.risks.length){h+='<section class="report-section"><h4>Risks</h4><ul>'+r.risks.map(function(r){return'<li>'+escapeHtml(r)+'</li>'}).join('')+'</ul></section>'}
  d.innerHTML=h;
}

function toggleReport(open){
  document.getElementById('main').classList.toggle('report-open',open);
  document.getElementById('report-toggle').setAttribute('aria-expanded',String(open));
  if(open){
    document.getElementById('report').scrollTop=0;
    document.querySelector('.report-close').focus();
  }else if(document.getElementById('input-bar').style.display!=='none'){
    document.getElementById('chatInput').focus();
  }
}

document.addEventListener('keydown',function(event){
  if(event.key==='Escape'&&document.getElementById('main').classList.contains('report-open'))toggleReport(false)
})

async function chat(){
  const inp=document.getElementById('chatInput');
  const msg=inp.value.trim();
  if(!msg||!sessionId)return;
  inp.value='';
  addMsg('user',msg);
  document.getElementById('progress').textContent='Thinking...';
  try{
    const resp=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,message:msg})});
    const data=await resp.json();
    if(!resp.ok)throw new Error(data.detail||'Unable to continue session');
    document.getElementById('progress').textContent='';
    addMsg('assistant',data.reply);
    if(data.tools_used&&data.tools_used.length)addMsg('system','Tools: '+data.tools_used.join(', '));
    loadSessions();
  }catch(e){
    document.getElementById('progress').textContent='';
    addMsg('error','Error: '+e.message);
  }
}

function escapeHtml(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
loadSessions();
</script>
