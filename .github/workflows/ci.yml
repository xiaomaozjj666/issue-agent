name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Type-check application
        run: mypy app/

      - name: Run tests
        run: pytest -v --cov=app --cov-report=term-missing

      - name: Security audit (pip-audit)
        # 依赖漏洞扫描：检测 PyPI 已知 CVE，失败阻断合并
        run: pip-audit --strict
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t issue-agent .

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
      - name: Install application and browser test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          npm ci
      - name: Install Chromium
        run: npx playwright install chromium --with-deps
      - name: Run browser regression tests
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
